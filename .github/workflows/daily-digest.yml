# 在 GitHub 云端定时运行：笔记本可关机。
#
# 使用官方「timezone + cron」：按 Asia/Shanghai 每天 11:05 触发（比整点略晚，减轻 GitHub 整点队列拥堵导致的延迟/丢跑）。
# 文档：https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
#
name: Daily digest email

on:
  schedule:
    - cron: "5 11 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅试跑（加 --dry-run，不发邮件；仍会请求 SerpAPI/DeepSeek）"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deepseek-news-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from repository secret
        env:
          DIGEST_DOTENV: ${{ secrets.DIGEST_DOTENV }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          raw = os.environ.get("DIGEST_DOTENV") or ""
          if not raw.strip():
              print("::error::缺少仓库密钥 DIGEST_DOTENV。GitHub：Settings → Secrets and variables → Actions → New repository secret，名称 DIGEST_DOTENV，值粘贴本机 .env 全文。")
              raise SystemExit(1)
          Path(".env").write_text(raw, encoding="utf-8")
          PY

      - name: Run daily digest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run: 不发邮件"
            python run_daily_digest.py --dry-run
          else
            python run_daily_digest.py
          fi
