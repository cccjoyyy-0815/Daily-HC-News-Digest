# 在 GitHub 云端定时运行：笔记本可关机。
#
# 重要：on.schedule 的 cron 一律按 UTC。下面默认 = 北京时间（东八区）每天 11:00。
# 若要「你所在时区的 11:00」，请改 cron（见仓库 README 里的对照表）。
#
name: Daily digest email

on:
  schedule:
    # 每天 03:00 UTC = 中国（含香港）东八区 11:00
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅试跑（加 --dry-run，不发邮件；仍会请求 SerpAPI/DeepSeek）"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deepseek-news-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 邮件标题里的日期、日志时间按东八区（与默认 cron 一致）；若你改了 cron 指向其它时区，请同步改 TZ
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from repository secret
        env:
          DIGEST_DOTENV: ${{ secrets.DIGEST_DOTENV }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          raw = os.environ.get("DIGEST_DOTENV") or ""
          if not raw.strip():
              print("::error::缺少仓库密钥 DIGEST_DOTENV。GitHub：Settings → Secrets and variables → Actions → New repository secret，名称 DIGEST_DOTENV，值粘贴本机 .env 全文。")
              raise SystemExit(1)
          Path(".env").write_text(raw, encoding="utf-8")
          PY

      - name: Run daily digest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run: 不发邮件"
            python run_daily_digest.py --dry-run
          else
            python run_daily_digest.py
          fi
