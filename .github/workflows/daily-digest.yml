# 美东（America/New_York）每天 11:05 发日报；cron 为 24 小时制（11=上午 11 点，23=晚上 11 点）。
# 夏令时/冬令时由 GitHub 按 IANA 自动处理。
#
# 若改回「北京时间上午 11 点」：timezone 与 TZ 均改为 Asia/Shanghai。
#
name: Daily digest email

on:
  schedule:
    - cron: "5 11 * * *"
      timezone: "America/New_York"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅试跑（加 --dry-run，不发邮件；仍会请求 SerpAPI/DeepSeek）"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deepseek-news-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: America/New_York
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from repository secret
        env:
          DIGEST_DOTENV: ${{ secrets.DIGEST_DOTENV }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          raw = os.environ.get("DIGEST_DOTENV") or ""
          if not raw.strip():
              print("::error::缺少仓库密钥 DIGEST_DOTENV。GitHub：Settings → Secrets and variables → Actions → New repository secret，名称 DIGEST_DOTENV，值粘贴本机 .env 全文。")
              raise SystemExit(1)
          Path(".env").write_text(raw, encoding="utf-8")
          PY

      - name: Run daily digest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run: 不发邮件"
            python run_daily_digest.py --dry-run
          else
            python run_daily_digest.py
          fi
